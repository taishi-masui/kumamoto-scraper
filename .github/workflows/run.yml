name: test-run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Python準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          pip install -r requirements.txt
          # ブラウザ本体と、実行に必要なシステム依存ライブラリを両方入れる
          playwright install chromium --with-deps

      - name: 実行
        run: python main.py

      # エラー原因を特定するためにスクリーンショットとHTMLを保存する設定
      - name: デバッグ用ファイルの保存
        if: always() # 実行に失敗しても必ず実行する
        uses: actions/upload-artifact@v4
        with:
          name: debug-results
          path: |
            debug_error.png
            debug_page.html
