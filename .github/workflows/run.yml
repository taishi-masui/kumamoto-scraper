name: Daily Construction Data Update

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日日本時間午前9時に実行
  workflow_dispatch:      # 手動実行ボタン

permissions:
  contents: write         # 書き込み権限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run scraper
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
        run: python main.py

      # ★外部ツールを使わず、直接「延命」コマンドを実行する
      - name: Keepalive (Manual)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Keepalive (automatically committed)"
          git push
