name: Daily Construction Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# ここを一番手厚い権限に設定します
permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 権限を保持したまま次のステップへ渡す
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run scraper
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
        run: python main.py

      # 60日制限対策（ここを修正）
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
          static_list: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # ★この1行を最後に追加
