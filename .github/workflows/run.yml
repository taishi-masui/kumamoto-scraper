name: test-run

on:
  workflow_dispatch:
  #schedule:
  #  - cron: '0 0 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Python準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 実行
        run: python main.py
        env:
          # 【重要】GitHub SecretsからGASのURLを読み込み、Pythonの環境変数にセットします
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}

      - name: 成果物とデバッグ情報の保存
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: kumamoto-bid-results
          path: |
            result.csv
            debug_after_click.png
            debug_result_view.png
          if-no-files-found: warn
