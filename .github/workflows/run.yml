name: test-run

on:
  workflow_dispatch: # 手動実行のみ残す
  # schedule:        # スケジュール実行をコメントアウト（無効化）
  #   - cron: '0 0 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Python準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          # 必要最小限のインストール
          pip install playwright
          playwright install chromium --with-deps

      - name: 実行
        run: python main.py
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}

      - name: 成果物とデバッグ情報の保存
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: kumamoto-bid-results
          path: |
            result.csv
          if-no-files-found: warn
