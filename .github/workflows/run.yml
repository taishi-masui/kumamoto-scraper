name: test-run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4   # ← v3 → v4

      - name: Python準備
        uses: actions/setup-python@v5   # ← v4 → v5
        with:
          python-version: "3.11"

      - name: 実行
        run: python main.py
